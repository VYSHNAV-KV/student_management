<div class="marks-container">
  <div class="marks-card">

    <h3 class="marks-title">Marks Entry (Table View)</h3>

    <!-- FILTERS -->
    <div class="filters">

      <div class="filter-group">
        <label>Section</label>
        <select [(ngModel)]="selectedSection"
                (change)="onSectionChange(); filterStudents()">
          <option value="">Select Section</option>
          <option *ngFor="let s of sections" [value]="s">{{s}}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Class</label>
        <select [(ngModel)]="selectedClass"
                (change)="filterStudents()"
                [disabled]="!selectedSection">
          <option value="">Select Class</option>
          <option *ngFor="let c of classes" [value]="c">{{c}}</option>
        </select>
      </div>

      <div class="filter-group">
        <label>Division</label>
        <select [(ngModel)]="selectedDivision"
                (change)="filterStudents()">
          <option value="">Select Division</option>
          <option *ngFor="let d of divisions" [value]="d">{{d}}</option>
        </select>
      </div>

    </div>

    <!-- TABLE -->
    <div class="table-wrapper" *ngIf="filteredStudents.length > 0">

      <table class="custom-table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Section</th>
            <th>Class</th>
            <th>Division</th>
            <th>Entered Mark</th>
            <th>Enter / Update</th>
            <th>Actions</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let s of filteredStudents">

            <td>
              <input [(ngModel)]="s.name">
            </td>

            <td>
              <select [(ngModel)]="s.section" (change)="s.class = ''">
                <option *ngFor="let sec of sections" [value]="sec">{{sec}}</option>
              </select>
            </td>

            <td>
              <select [(ngModel)]="s.class">
                <option *ngFor="let c of getClasses(s.section)" [value]="c">{{c}}</option>
              </select>
            </td>

            <td>
              <select [(ngModel)]="s.division">
                <option *ngFor="let d of divisions" [value]="d">{{d}}</option>
              </select>
            </td>

            <td>
              <span *ngIf="s.enteredMark !== null; else noMark" class="badge success">
                {{s.enteredMark}}
              </span>
              <ng-template #noMark>
                <span class="badge warning">Not Set</span>
              </ng-template>
            </td>

            <td>
              <input type="number" [(ngModel)]="s.marks" placeholder="Enter marks">
            </td>

            <td>
              <button class="btn save" (click)="saveAll(s)">Save</button>
              <button class="btn delete" (click)="deleteStudent(s)">Delete</button>
            </td>

          </tr>
        </tbody>
      </table>

    </div>

    <!-- NO DATA -->
    <div *ngIf="filteredStudents.length === 0" class="no-data">
      No students found
    </div>

  </div>
</div>
