<div class="container mt-5">
  <div class="card shadow p-4">
    
    <h3 class="text-center mb-4 text-primary">Add Student</h3>

    <!-- Name -->
    <div class="mb-3">
      <label class="form-label">Student Name</label>
      <input 
        type="text" 
        class="form-control" 
        [(ngModel)]="student.name" 
        placeholder="Enter student name">
    </div>

    <!-- Section -->
    <div class="mb-3">
      <label class="form-label">Section</label>
      <select 
        class="form-select" 
        [(ngModel)]="student.section" 
        (change)="onSectionChange()">
        <option value="">Select Section</option>
        <option *ngFor="let s of sections" [value]="s">{{s}}</option>
      </select>
    </div>

    <!-- Class -->
    <div class="mb-3">
      <label class="form-label">Class</label>
      <select 
        class="form-select" 
        [(ngModel)]="student.class"
        [disabled]="!student.section">
        <option value="">Select Class</option>
        <option *ngFor="let c of classes" [value]="c">{{c}}</option>
      </select>
    </div>

    <!-- Division -->
    <div class="mb-3">
      <label class="form-label">Division</label>
      <select 
        class="form-select" 
        [(ngModel)]="student.division">
        <option value="">Select Division</option>
        <option *ngFor="let d of divisions" [value]="d">{{d}}</option>
      </select>
    </div>

    <!-- Button -->
    <div class="d-grid">
      <button class="btn btn-primary" (click)="addStudent()">
        Add Student
      </button>
    </div>

  </div>
</div>
