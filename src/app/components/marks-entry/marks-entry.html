<div class="container mt-5">
  <div class="card shadow p-4">

    <h3 class="text-center text-primary mb-4">
      Marks Entry (Table View)
    </h3>

    <!-- FILTERS -->
    <div class="row g-3">

      <!-- Section -->
      <div class="col-md-4">
        <label class="form-label">Section</label>
        <select 
          class="form-select"
          [(ngModel)]="selectedSection"
          (change)="onSectionChange(); filterStudents()">
          <option value="">Select Section</option>
          <option *ngFor="let s of sections" [value]="s">{{s}}</option>
        </select>
      </div>

      <!-- Class -->
      <div class="col-md-4">
        <label class="form-label">Class</label>
        <select 
          class="form-select"
          [(ngModel)]="selectedClass"
          (change)="filterStudents()"
          [disabled]="!selectedSection">
          <option value="">Select Class</option>
          <option *ngFor="let c of classes" [value]="c">{{c}}</option>
        </select>
      </div>

      <!-- Division -->
      <div class="col-md-4">
        <label class="form-label">Division</label>
        <select 
          class="form-select"
          [(ngModel)]="selectedDivision"
          (change)="filterStudents()">
          <option value="">Select Division</option>
          <option *ngFor="let d of divisions" [value]="d">{{d}}</option>
        </select>
      </div>

    </div>

    <!-- TABLE -->
    <div class="table-responsive mt-4" *ngIf="filteredStudents.length > 0">

      <table class="table table-bordered table-hover text-center align-middle">
        <thead class="table-dark">
          <tr>
            <th>Name</th>
            <th>Class</th>
            <th>Division</th>
            <th>Entered Mark</th>
            <th>Enter / Update Mark</th>
            <th>Action</th>
          </tr>
        </thead>

        <tbody>
          <tr *ngFor="let s of filteredStudents">
            <td>{{s.name}}</td>
            <td>{{s.class}}</td>
            <td>{{s.division}}</td>

            <!-- Entered Mark -->
            <td>
              <span *ngIf="s.enteredMark !== null; else noMark" class="badge bg-success">
                {{s.enteredMark}}
              </span>
              <ng-template #noMark>
                <span class="badge bg-secondary">Not Set</span>
              </ng-template>
            </td>

            <!-- Input -->
            <td>
              <input 
                type="number" 
                class="form-control"
                [(ngModel)]="s.marks"
                placeholder="Enter marks">
            </td>

            <!-- Action -->
            <td>
              <button 
                class="btn btn-sm btn-primary"
                (click)="saveMarks(s)">
                Save
              </button>
            </td>
          </tr>
        </tbody>

      </table>
    </div>

    <!-- NO DATA -->
    <div *ngIf="filteredStudents.length === 0" class="mt-4 text-center">
      <div class="alert alert-warning">
        No students found
      </div>
    </div>

  </div>
</div>
