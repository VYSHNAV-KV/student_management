<div class="form-container">
  <div class="form-card">
    
    <h3 class="form-title">Add Student</h3>

    <!-- Name -->
    <div class="form-group">
      <label>Student Name</label>
      <input 
        type="text" 
        [(ngModel)]="student.name" 
        placeholder="Enter student name">
    </div>

    <!-- Section -->
    <div class="form-group">
      <label>Section</label>
      <select 
        [(ngModel)]="student.section" 
        (change)="onSectionChange()">
        <option value="">Select Section</option>
        <option *ngFor="let s of sections" [value]="s">{{s}}</option>
      </select>
    </div>

    <!-- Class -->
    <div class="form-group">
      <label>Class</label>
      <select 
        [(ngModel)]="student.class"
        [disabled]="!student.section">
        <option value="">Select Class</option>
        <option *ngFor="let c of classes" [value]="c">{{c}}</option>
      </select>
    </div>

    <!-- Division -->
    <div class="form-group">
      <label>Division</label>
      <select [(ngModel)]="student.division">
        <option value="">Select Division</option>
        <option *ngFor="let d of divisions" [value]="d">{{d}}</option>
      </select>
    </div>

    <!-- Button -->
    <button class="submit-btn" (click)="addStudent()">
      Add Student
    </button>

  </div>
</div>
