<div class="graph-container">
  <div class="graph-card">

    <h3 class="graph-title">Filtered Student Graph</h3>

    <!-- FILTERS -->
    <div class="graph-filters">

      <!-- Section -->
      <div class="filter-group">
        <label>Section</label>
        <select 
          [(ngModel)]="selectedSection"
          (change)="onSectionChange()">
          <option value="">Select Section</option>
          <option *ngFor="let s of sections" [value]="s">{{s}}</option>
        </select>
      </div>

      <!-- Class -->
      <div class="filter-group">
        <label>Class</label>
        <select 
          [(ngModel)]="selectedClass"
          [disabled]="!selectedSection">
          <option value="">Select Class</option>
          <option *ngFor="let c of classes" [value]="c">{{c}}</option>
        </select>
      </div>

      <!-- Division -->
      <div class="filter-group">
        <label>Division</label>
        <select [(ngModel)]="selectedDivision">
          <option value="">All Divisions</option>
          <option *ngFor="let d of divisions" [value]="d">{{d}}</option>
        </select>
      </div>

      <!-- Button -->
      <div class="filter-group button-group">
        <button (click)="loadChart()">Show Graph</button>
      </div>

    </div>

    <!-- CHART -->
    <div class="chart-container">
      <canvas id="chart"></canvas>
    </div>

  </div>
</div>
